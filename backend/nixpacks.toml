# Nixpacks configuration for JudiScribe backend
# xhtml2pdf → svglib → rlpycairo → pycairo requiere libcairo2-dev + libxcb1-dev
# ffmpeg: compresión de audio antes de enviar a Deepgram (reduce tamaño 20x)
# CPATH=/usr/include hace que el gcc de Nix encuentre los headers de apt

[phases.setup]
aptPkgs = ["libcairo2-dev", "libxcb1-dev", "pkg-config", "libffi-dev", "ffmpeg", "libpq-dev"]

[variables]
CPATH = "/usr/include"

[start]
cmd = "mkdir -p /app/audio_files && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
