worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Tamaño máximo de upload (para archivos de audio — límite del backend: 2GB)
    client_max_body_size 2G;

    # Resolver DNS interno de Docker — re-resuelve IPs cada 10s tras reinicio de contenedores
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Redirección de HTTP (80) a HTTPS (443)
    server {
        listen 80;
        server_name judiscribe.tech www.judiscribe.tech;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Bloque Principal SSL (443)
    server {
        listen 443 ssl;
        server_name judiscribe.tech www.judiscribe.tech;

        # Configuración de Certificados (Let's Encrypt)
        ssl_certificate /etc/letsencrypt/live/judiscribe.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/judiscribe.tech/privkey.pem;

        # Optimización SSL
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # Variables para resolver dinámico (evita 502 al reiniciar contenedores)
        set $backend_upstream  http://backend:8000;
        set $frontend_upstream http://frontend:3000;

        # ── Upload de audio → Backend (archivos grandes, sin timeout agresivo) ──
        location /api/transcripcion-audio/ {
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout    1800s;
            proxy_send_timeout    1800s;
            proxy_connect_timeout 30s;
            proxy_request_buffering off;
        }

        # ── Audio streaming → backend (range requests para seeking) ─────────
        location ~* ^/api/audiencias/[^/]+/audio$ {
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering         off;
            proxy_request_buffering off;
            proxy_read_timeout      300s;
        }

        # ── API REST → Backend FastAPI ──────────────────────
        location /api/ {
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout    600s;
            proxy_connect_timeout 10s;
            proxy_send_timeout    600s;
        }

        # ── WebSocket → Backend (transcripción en vivo) ────
        location /ws/ {
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 10s;
        }

        # ── Frontend (Next.js) ─────────────────────────────
        location / {
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
