worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Tamaño máximo de upload (para archivos de audio — límite del backend: 2GB)
    client_max_body_size 2G;

    # Upstream definitions
    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    # Redirección de HTTP (80) a HTTPS (443)
    server {
        listen 80;
        server_name judiscribe.tech www.judiscribe.tech;
        
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Bloque Principal SSL (443)
    server {
        listen 443 ssl;
        server_name judiscribe.tech www.judiscribe.tech;

        # Configuración de Certificados (Let's Encrypt)
        ssl_certificate /etc/letsencrypt/live/judiscribe.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/judiscribe.tech/privkey.pem;

        # Optimización SSL
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # ── Upload de audio → Backend (archivos grandes, sin timeout agresivo) ──
        location /api/transcripcion-audio/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Upload de 2GB + FFmpeg compress puede tardar varios minutos
            proxy_read_timeout    1800s;
            proxy_send_timeout    1800s;
            proxy_connect_timeout 30s;

            # Buffering desactivado: permite streaming del upload directo al backend
            proxy_request_buffering off;
        }

        # ── Audio streaming → backend (range requests para seeking) ─────────
        location ~* ^/api/audiencias/[^/]+/audio$ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # No buffering: pasar Range requests y la respuesta directamente
            proxy_buffering        off;
            proxy_request_buffering off;
            proxy_read_timeout     300s;
        }

        # ── API REST → Backend FastAPI ──────────────────────
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout largo para generación de actas (Claude)
            proxy_read_timeout    180s;
            proxy_connect_timeout 10s;
            proxy_send_timeout    180s;
        }

        # ── WebSocket → Backend (transcripción en vivo) ────
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout largo para sesiones de transcripción (hasta 1 hora)
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 10s;
        }

        # ── Frontend (Next.js) ─────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Next.js HMR WebSocket (desarrollo)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
