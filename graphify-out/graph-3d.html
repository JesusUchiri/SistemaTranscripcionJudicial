<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>JudiScribe — Knowledge Graph 3D</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #050810; color: #e8eef7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
  #graph { position: absolute; inset: 0; }
  #ui {
    position: fixed; top: 12px; left: 12px; z-index: 10;
    background: rgba(8, 12, 22, 0.85); border: 1px solid rgba(120, 160, 220, 0.18);
    border-radius: 10px; padding: 14px 16px; backdrop-filter: blur(10px);
    width: 320px; max-height: calc(100vh - 24px); overflow-y: auto;
  }
  #ui h1 { margin: 0 0 4px; font-size: 14px; font-weight: 600; letter-spacing: 0.5px; }
  #ui .sub { margin: 0 0 12px; font-size: 11px; color: #7a8aa3; }
  #ui input[type="text"] { width: 100%; padding: 6px 10px; box-sizing: border-box; background: rgba(20, 26, 40, 0.9); border: 1px solid rgba(120, 160, 220, 0.2); color: #e8eef7; border-radius: 6px; font-size: 12px; outline: none; }
  #ui input[type="text"]:focus { border-color: #5e81ff; }
  #ui .row { display: flex; gap: 6px; align-items: center; margin: 8px 0; font-size: 12px; }
  #ui .row label { flex: 1; cursor: pointer; user-select: none; }
  #ui select { background: rgba(20, 26, 40, 0.9); border: 1px solid rgba(120, 160, 220, 0.2); color: #e8eef7; padding: 4px 6px; border-radius: 4px; font-size: 12px; }
  #ui .legend { margin-top: 14px; border-top: 1px solid rgba(120, 160, 220, 0.12); padding-top: 10px; }
  #ui .legend h2 { margin: 0 0 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #7a8aa3; font-weight: 600; }
  #ui .lg { display: flex; align-items: center; gap: 8px; font-size: 11px; margin: 3px 0; cursor: pointer; }
  #ui .lg .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  #ui .lg.dim { opacity: 0.35; }
  #ui .stats { margin-top: 10px; font-size: 10px; color: #5a6a85; line-height: 1.5; }
  #inspector {
    position: fixed; top: 12px; right: 12px; z-index: 10;
    background: rgba(8, 12, 22, 0.92); border: 1px solid rgba(120, 160, 220, 0.18);
    border-radius: 10px; padding: 14px 16px; backdrop-filter: blur(10px);
    width: 360px; max-height: calc(100vh - 24px); overflow-y: auto;
    display: none;
  }
  #inspector.visible { display: block; }
  #inspector h2 { margin: 0 0 4px; font-size: 14px; font-weight: 600; color: #c5d4ee; }
  #inspector .meta { font-size: 11px; color: #7a8aa3; margin-bottom: 12px; word-break: break-all; }
  #inspector .meta code { background: rgba(120, 160, 220, 0.08); padding: 1px 5px; border-radius: 3px; color: #9fb5d8; }
  #inspector h3 { margin: 12px 0 6px; font-size: 10px; color: #7a8aa3; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
  #inspector .edge { font-size: 11px; margin: 4px 0; padding: 4px 6px; background: rgba(20, 26, 40, 0.5); border-radius: 4px; cursor: pointer; transition: background 0.15s; }
  #inspector .edge:hover { background: rgba(94, 129, 255, 0.18); }
  #inspector .edge .rel { color: #7d9fdb; font-size: 10px; }
  #inspector .edge .conf { float: right; font-size: 9px; padding: 1px 5px; border-radius: 8px; }
  #inspector .conf.EXTRACTED { background: rgba(80, 200, 120, 0.18); color: #6cd99a; }
  #inspector .conf.INFERRED { background: rgba(240, 180, 80, 0.18); color: #e8b95a; }
  #inspector .conf.AMBIGUOUS { background: rgba(240, 90, 90, 0.18); color: #e8786a; }
  #inspector .close { position: absolute; top: 10px; right: 12px; cursor: pointer; color: #7a8aa3; font-size: 16px; user-select: none; }
  #inspector .close:hover { color: #e8eef7; }
  #hint { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); z-index: 5; font-size: 11px; color: #5a6a85; background: rgba(8, 12, 22, 0.7); padding: 5px 12px; border-radius: 12px; backdrop-filter: blur(6px); }
  .tooltip { position: absolute; padding: 4px 8px; background: rgba(8, 12, 22, 0.95); border: 1px solid rgba(120, 160, 220, 0.25); color: #e8eef7; font-size: 11px; border-radius: 4px; pointer-events: none; }
</style>
</head>
<body>
<div id="graph"></div>

<div id="ui">
  <h1>JudiScribe — Graph 3D</h1>
  <p class="sub">WebGL · Three.js · force-directed</p>
  <input id="search" type="text" placeholder="Buscar nodo… (Enter)" autocomplete="off"/>
  <div class="row">
    <label for="colorBy">Color por:</label>
    <select id="colorBy">
      <option value="community" selected>Comunidad</option>
      <option value="filetype">Tipo de archivo</option>
    </select>
  </div>
  <div class="row">
    <input type="checkbox" id="showLabels"/>
    <label for="showLabels">Mostrar etiquetas siempre</label>
  </div>
  <div class="row">
    <input type="checkbox" id="dagMode"/>
    <label for="dagMode">Modo jerárquico (radial)</label>
  </div>

  <div class="legend">
    <h2>Comunidades (top)</h2>
    <div id="legend-communities"></div>
  </div>
  <div class="stats" id="stats"></div>
</div>

<div id="inspector">
  <span class="close" id="inspectorClose">✕</span>
  <h2 id="ins-label"></h2>
  <div class="meta" id="ins-meta"></div>
  <h3 id="ins-out-h" style="display:none">Salientes</h3>
  <div id="ins-out"></div>
  <h3 id="ins-in-h" style="display:none">Entrantes</h3>
  <div id="ins-in"></div>
</div>

<div id="hint">Click: inspeccionar · doble-click: hacer foco · arrastra: rotar · scroll: zoom</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1.73.4/dist/3d-force-graph.min.js"></script>
<script>
(async function () {
  const resp = await fetch('graph.json');
  const data = await resp.json();

  const nodes = data.nodes.map(n => ({
    id: n.id,
    label: n.label || n.id,
    community: n.community ?? -1,
    community_label: n.community_label || ('Cluster ' + (n.community ?? '?')),
    file_type: n.file_type || 'unknown',
    source_file: n.source_file || '',
    source_location: n.source_location || '',
  }));
  const links = (data.links || data.edges || []).map(e => ({
    source: e.source, target: e.target,
    relation: e.relation || '',
    confidence: e.confidence || '',
    confidence_score: e.confidence_score ?? 1.0,
  }));

  // Build adjacency for inspector
  const outAdj = new Map(); // id -> [{target, relation, confidence}]
  const inAdj  = new Map();
  for (const l of links) {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    if (!outAdj.has(s)) outAdj.set(s, []);
    if (!inAdj.has(t))  inAdj.set(t, []);
    outAdj.get(s).push({ target: t, relation: l.relation, confidence: l.confidence });
    inAdj.get(t).push({ source: s, relation: l.relation, confidence: l.confidence });
  }
  const nodeById = new Map(nodes.map(n => [n.id, n]));

  // Community palette (HSL hash → distinct colors)
  function colorForCommunity(c) {
    const h = (c * 47) % 360;
    return `hsl(${h}, 65%, 60%)`;
  }
  const FILE_TYPE_COLOR = {
    code: '#5e81ff', document: '#ffb454', paper: '#a484f0',
    image: '#4ad6c7', rationale: '#f06b8e', unknown: '#7a8aa3',
  };

  // Determine top communities
  const commCount = {};
  for (const n of nodes) commCount[n.community] = (commCount[n.community] || 0) + 1;
  const topComms = Object.entries(commCount).sort((a, b) => b[1] - a[1]).slice(0, 18);

  // Legend
  const legend = document.getElementById('legend-communities');
  const activeComms = new Set(topComms.map(([c]) => c));
  for (const [cid, cnt] of topComms) {
    const sample = nodes.find(n => String(n.community) === String(cid));
    const label = sample ? sample.community_label : ('Cluster ' + cid);
    const row = document.createElement('div');
    row.className = 'lg';
    row.dataset.cid = cid;
    row.innerHTML = `<span class="dot" style="background:${colorForCommunity(+cid)}"></span><span>${label} <small style="color:#5a6a85">(${cnt})</small></span>`;
    row.addEventListener('click', () => {
      if (activeComms.has(cid)) { activeComms.delete(cid); row.classList.add('dim'); }
      else { activeComms.add(cid); row.classList.remove('dim'); }
      Graph.refresh();
    });
    legend.appendChild(row);
  }

  document.getElementById('stats').textContent =
    `${nodes.length} nodos · ${links.length} edges · ${Object.keys(commCount).length} comunidades`;

  // Build graph
  let colorMode = 'community';
  let showLabels = false;
  const Graph = ForceGraph3D()(document.getElementById('graph'))
    .backgroundColor('#050810')
    .graphData({ nodes, links })
    .nodeId('id')
    .nodeRelSize(3.2)
    .nodeColor(n => {
      const dim = !activeComms.has(String(n.community));
      const base = colorMode === 'community'
        ? colorForCommunity(n.community)
        : (FILE_TYPE_COLOR[n.file_type] || FILE_TYPE_COLOR.unknown);
      return dim ? '#2a3346' : base;
    })
    .nodeOpacity(0.95)
    .nodeVal(n => 1 + (outAdj.get(n.id)?.length || 0) + (inAdj.get(n.id)?.length || 0) * 0.6)
    .nodeLabel(n => `<div class="tooltip"><b>${n.label}</b><br/><small>${n.community_label}</small></div>`)
    .nodeThreeObjectExtend(true)
    .nodeThreeObject(n => {
      if (!showLabels) return null;
      const sprite = new SpriteText(n.label);
      sprite.color = '#e8eef7';
      sprite.textHeight = 2.5;
      sprite.backgroundColor = 'rgba(8,12,22,0.6)';
      sprite.padding = 1;
      return sprite;
    })
    .linkColor(l => {
      if (l.confidence === 'AMBIGUOUS') return 'rgba(240, 90, 90, 0.35)';
      if (l.confidence === 'INFERRED') return 'rgba(240, 180, 80, 0.32)';
      return 'rgba(140, 170, 220, 0.22)';
    })
    .linkOpacity(0.6)
    .linkWidth(l => 0.4 + (l.confidence_score || 0) * 0.7)
    .linkDirectionalParticles(l => l.confidence === 'EXTRACTED' ? 1 : 0)
    .linkDirectionalParticleSpeed(0.005)
    .linkDirectionalParticleWidth(1.2)
    .onNodeClick(n => showInspector(n))
    .onNodeRightClick(n => Graph.cameraPosition(
      { x: n.x * 1.4, y: n.y * 1.4, z: n.z * 1.4 }, n, 1500
    ))
    .onBackgroundClick(() => hideInspector());

  // SpriteText fallback (3d-force-graph bundles three-spritetext from CDN)
  // If SpriteText is missing, fall back to no labels.
  if (typeof SpriteText === 'undefined') {
    document.getElementById('showLabels').disabled = true;
  }

  // Controls
  document.getElementById('colorBy').addEventListener('change', e => {
    colorMode = e.target.value;
    Graph.nodeColor(Graph.nodeColor()); // re-apply
    Graph.refresh();
  });
  document.getElementById('showLabels').addEventListener('change', e => {
    showLabels = e.target.checked;
    Graph.nodeThreeObject(Graph.nodeThreeObject());
    Graph.refresh();
  });
  document.getElementById('dagMode').addEventListener('change', e => {
    Graph.dagMode(e.target.checked ? 'radialout' : null);
    Graph.dagLevelDistance(60);
    Graph.numDimensions(3);
    Graph.refresh();
  });
  document.getElementById('search').addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const q = e.target.value.trim().toLowerCase();
    if (!q) return;
    const hit = nodes.find(n => n.label.toLowerCase().includes(q) || n.id.toLowerCase().includes(q));
    if (hit) {
      Graph.centerAt && Graph.centerAt(hit.x, hit.y, 800);
      Graph.cameraPosition(
        { x: (hit.x||0) * 1.3, y: (hit.y||0) * 1.3, z: (hit.z||0) * 1.3 + 80 },
        hit, 1200
      );
      showInspector(hit);
    }
  });

  // Inspector
  const ins = document.getElementById('inspector');
  function showInspector(n) {
    ins.classList.add('visible');
    document.getElementById('ins-label').textContent = n.label;
    const meta = document.getElementById('ins-meta');
    meta.innerHTML = `
      <code>${n.community_label}</code> · <code>${n.file_type}</code><br/>
      <span style="color:#9fb5d8">${n.source_file}${n.source_location ? ' · ' + n.source_location : ''}</span>
    `;
    renderEdges('ins-out', 'ins-out-h', outAdj.get(n.id) || [], 'target', '→');
    renderEdges('ins-in',  'ins-in-h',  inAdj.get(n.id)  || [], 'source', '←');
  }
  function renderEdges(divId, hId, list, key, arrow) {
    const box = document.getElementById(divId);
    const header = document.getElementById(hId);
    box.innerHTML = '';
    if (!list.length) { header.style.display = 'none'; return; }
    header.style.display = 'block';
    header.textContent = (arrow === '→' ? 'Salientes' : 'Entrantes') + ' (' + list.length + ')';
    for (const e of list.slice(0, 40)) {
      const other = nodeById.get(e[key]);
      if (!other) continue;
      const div = document.createElement('div');
      div.className = 'edge';
      div.innerHTML = `<span class="conf ${e.confidence}">${e.confidence || '?'}</span>
        <span class="rel">${arrow} ${e.relation}</span><br/>${other.label}`;
      div.addEventListener('click', () => showInspector(other));
      box.appendChild(div);
    }
  }
  function hideInspector() { ins.classList.remove('visible'); }
  document.getElementById('inspectorClose').addEventListener('click', hideInspector);

  // Initial camera
  setTimeout(() => Graph.zoomToFit(800, 80), 1500);
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/three-spritetext@1.6.5/dist/three-spritetext.min.js"></script>
</body>
</html>
